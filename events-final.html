<!doctype html>
<html lang="ar" dir="rtl">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>فعاليات طب الرئة العلمية</title>
<style>
*{box-sizing:border-box}body{margin:0;font-family:system-ui,-apple-system,"Segoe UI",Tahoma,Arial,sans-serif;background:#06252b;color:#eef8f7;min-height:100vh}.wrap{width:min(1100px,92vw);margin:auto}header{padding:22px 0}.brand{font-size:clamp(22px,3vw,32px);font-weight:900}.hero{padding:28px 0}.hero h1{font-size:clamp(32px,5vw,56px);margin:0}.section{padding:26px 0 44px}.section h2{font-size:clamp(26px,4vw,40px);margin:0 0 20px}.cards{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:24px}.card{background:#fff;color:#12272b;border-radius:26px;overflow:hidden;box-shadow:0 24px 70px rgba(0,0,0,.28)}.poster{height:430px;background:#061b21;display:flex;align-items:center;justify-content:center;border-bottom:1px solid #e6eeee;overflow:hidden}.poster img{max-width:100%;max-height:100%;width:auto;height:auto;display:block}.body{background:#fff;padding:24px}.badge{display:inline-flex;background:#e9f8f2;color:#09654d;border-radius:999px;padding:7px 12px;font-size:12px;font-weight:900;margin-bottom:12px}.title{font-size:24px;line-height:1.25;margin:0 0 16px}.facts{display:grid;gap:8px;margin:0 0 20px;color:#3e5b58;font-size:15px}.facts div{display:flex;gap:8px}.facts b{min-width:80px;color:#12272b}.actions{display:flex;gap:10px;flex-wrap:wrap}button{border:0;border-radius:999px;padding:12px 18px;font-weight:850;cursor:pointer}.details{background:#103a43;color:#fff}.view{background:#16af83;color:#fff}.modal{position:fixed;inset:0;z-index:50;display:none;align-items:center;justify-content:center;background:rgba(0,0,0,.78);padding:18px}.modal.open{display:flex}.panel{width:min(960px,96vw);max-height:92vh;overflow:auto;background:#fff;color:#12272b;border-radius:26px;box-shadow:0 30px 90px rgba(0,0,0,.4)}.panel.dark{background:#061b21;padding:12px}.head{display:flex;justify-content:space-between;gap:12px;padding:18px 20px;border-bottom:1px solid #e6eeee}.content{padding:20px}.brochureImg{display:block;max-width:100%;max-height:84vh;margin:auto;border-radius:18px;background:#061b21}.agenda{white-space:pre-line;background:#f3faf8;border:1px solid #d7ece7;border-radius:18px;padding:16px;line-height:1.8}.loading{color:#b7d3d0;font-weight:800}@media(max-width:860px){.cards{grid-template-columns:1fr}.poster{height:410px}}
</style>
</head>
<body>
<header class="wrap"><div class="brand">فعاليات طب الرئة العلمية</div></header>
<section class="hero"><div class="wrap"><h1>فعاليات طب الرئة العلمية</h1></div></section>
<section class="section"><div class="wrap"><h2>الفعاليات السابقة</h2><div class="cards" id="cards"></div></div></section>
<div class="modal" id="detailsModal"><div class="panel"><div class="head"><strong id="detailsTitle"></strong><button onclick="closeDetails()">×</button></div><div class="content"><div id="detailsFacts" class="facts"></div><h3>المتحدثون</h3><p id="detailsSpeakers"></p><h3>البرنامج</h3><div id="detailsAgenda" class="agenda"></div><div class="actions" style="margin-top:18px"><button class="view" id="detailsBrochureBtn">عرض البروشور</button></div></div></div></div>
<div class="modal" id="brochureModal"><div class="panel dark"><div style="display:flex;justify-content:flex-end;margin-bottom:10px"><button onclick="closeBrochure()">×</button></div><img id="brochureImage" class="brochureImg" alt="Brochure"></div></div>
<script>
const events=[
{status:'Previous',title:'6th ILD MDT Meeting',field:'ILD MDT / Pulmonary Medicine',type:'MDT Meeting',date:'2026-02-02',time:'9:00 PM - 11:00 PM',location:'Virtual',chair:'Dr. Mohammed Alghamdi',organizers:'Dr. Bader Alassiri; Dr. Hind Alsaleha',speakers:'Dr. Abdullah Aseeri; Dr. Rahma Alsilmi; Dr. Fahad Alobaid; Dr. Amani Alifi; Dr. Ahmed Almuqati; Dr. Lamia Jamjoom',agenda:'9:00 - 9:05 Welcome and Introduction\n9:05 - 10:45 ILD MDT: Case Presentation\n10:45 - 11:00 Boehringer Presentation\nQ & A',key:'brochure1'},
{status:'Previous',title:'Pulmonary Insights Series - Pulmonary Hypertension - 9th Edition',field:'Pulmonary Hypertension / Pulmonary Medicine',type:'Scientific Series',date:'2026-05-17',time:'08:00 PM - 10:00 PM',location:'Virtual',chair:'Dr. Hanan Fan',organizers:'Dr. Mohammed Alghamdi; Dr. Osama Alzahrani',speakers:'Dr. Nick H. Kim; Dr. Khaled M. Alobaidallah; Dr. Fayez K. Alahmadi; Dr. Bader Alghamdi; Dr. Mohammed Alghamdi',agenda:'07:55 - 08:00 Welcome and Introduction — Dr. Osama Alzahrani\n08:00 - 08:45 Pulmonary Arterial Hypertension: Current Standards of Care and Management — Dr. Nick H. Kim\n08:45 - 09:00 How RV Health Serves as a Gateway to Better PAH Outcomes — Dr. Khaled M. Alobaidallah\n09:00 - 09:15 Unlocking Potential: Sustained Practical Gains with sGC Stimulation — Dr. Fayez K. Alahmadi\n09:15 - 09:20 Break\n09:20 - 09:50 Cardiopulmonary Exercise Testing (CPET) — Dr. Bader Alghamdi\n09:50 - 10:00 Q/A and close — Dr. Mohammed Alghamdi',key:'brochure2'}
];
const images={};
function renderBase(){document.getElementById('cards').innerHTML=events.map((e,i)=>`<article class="card"><div class="poster"><span class="loading" id="loading${i}">جاري تحميل البروشور...</span><img id="poster${i}" alt="${e.title}" style="display:none"></div><div class="body"><span class="badge">${e.status}</span><h3 class="title">${e.title}</h3><div class="facts"><div><b>التاريخ</b><span>${e.date}</span></div><div><b>الوقت</b><span>${e.time}</span></div><div><b>الموقع</b><span>${e.location}</span></div><div><b>الرئيس</b><span>${e.chair}</span></div></div><div class="actions"><button class="details" onclick="openDetails(${i})">التفاصيل</button><button class="view" onclick="openBrochure(${i})">عرض البروشور</button></div></div></article>`).join('')}
function setImages(){events.forEach((e,i)=>{const img=document.getElementById('poster'+i);const load=document.getElementById('loading'+i);if(images[e.key]){img.onload=()=>{img.style.display='block';if(load)load.style.display='none'};img.onerror=()=>{if(load)load.textContent='تعذر تحميل الصورة'};img.src=images[e.key];}})}
async function loadImages(){const html=await fetch('pulmonary-events/index.html?src='+Date.now(),{cache:'no-store'}).then(r=>r.text());['brochure1','brochure2'].forEach(k=>{const m=html.match(new RegExp('const\\s+'+k+'\\s*=\\s*"([^"]+)"'));if(m)images[k]=m[1];});setImages();}
window.openBrochure=function(i){const src=images[events[i].key];if(!src)return;const im=document.getElementById('brochureImage');im.src=src;document.getElementById('brochureModal').classList.add('open')}
window.closeBrochure=function(){document.getElementById('brochureModal').classList.remove('open')}
window.openDetails=function(i){const e=events[i];document.getElementById('detailsTitle').textContent=e.title;document.getElementById('detailsFacts').innerHTML=`<div><b>المجال</b><span>${e.field}</span></div><div><b>النوع</b><span>${e.type}</span></div><div><b>التاريخ</b><span>${e.date}</span></div><div><b>الوقت</b><span>${e.time}</span></div><div><b>الموقع</b><span>${e.location}</span></div><div><b>الرئيس</b><span>${e.chair}</span></div><div><b>المنظمون</b><span>${e.organizers}</span></div>`;document.getElementById('detailsSpeakers').textContent=e.speakers;document.getElementById('detailsAgenda').textContent=e.agenda;document.getElementById('detailsBrochureBtn').onclick=()=>openBrochure(i);document.getElementById('detailsModal').classList.add('open')}
window.closeDetails=function(){document.getElementById('detailsModal').classList.remove('open')}
document.getElementById('detailsModal').onclick=e=>{if(e.target.id==='detailsModal')closeDetails()};document.getElementById('brochureModal').onclick=e=>{if(e.target.id==='brochureModal')closeBrochure()};
renderBase();loadImages().catch(()=>{document.querySelectorAll('.loading').forEach(x=>x.textContent='تعذر تحميل الصورة')});
</script>
</body></html>
